# Coverage replication batch size (files per request)
batch_size = 64
# Number of parallel upload workers (1 = sequential, >1 = parallel)
parallel_uploads = 1 # set to 1 to avoid the server flood
# Minimum interval between coverage upload requests (milliseconds, 0 disables throttling)
upload_min_interval_ms = 5000
# Base backoff delay for retryable coverage upload failures (milliseconds)
upload_backoff_base_ms = 10000
# Max backoff delay for retryable coverage upload failures (milliseconds)
upload_backoff_max_ms = 70000
# Pending delta threshold that triggers baseline coverage sync (0 disables baseline sync)
baseline_threshold = 50000
# Coverage journal compaction thresholds
compaction_min_entries = 1000
compaction_idle_quiet_secs = 10
compaction_min_interval_secs = 30
compaction_max_interval_secs = 300
compaction_max_journal_bytes = 8000000
compaction_bulk_force_journal_bytes = 64000000
compaction_error_backoff_secs = 60
compaction_bulk_mode_enabled = true

[mount]
# Skip re-encrypting updates for large sparse files to avoid densifying and disk blowups.
# Set to 0 to disable sparse update skipping, now is 2 GiB by default.
sparse_skip_size_bytes = 2147483648
# Use streaming (chunked) encryption for large files to avoid full in-memory reads.
# Set to 0 to disable streaming and always use in-memory encryption. Now is 1024 MiB by default.
stream_threshold_bytes = 1073741824
# Chunk size for streaming encryption/decryption. If file larger than stream_threshold_bytes,
# it will be processed in chunks of this size. Now is 256 MiB by default
stream_chunk_size_bytes = 268435456

# Delay encrypting large files until they have been stable for this many seconds.set to 0 to disable stability wait, otherwise, the larger file may not appear in the encrypted folder at all.
stream_stability_age_secs = 0

# Startup reconciliation safety guard for sync mount.
# When HybridCipher detects an unclean previous mount start, it runs reconciliation to recover
# pending work. During that process, "local deleted" actions can be inferred if many previously
# tracked files are missing from the decrypted mount view.
#
# This setting is a hard cap on how many startup local-delete actions may be queued in one pass.
# If reconciliation detects more than this value, HybridCipher aborts reconciliation for that
# startup cycle instead of queueing a bulk delete operation that could move many encrypted files
# into retention due to a bad mountpoint state.
#
# Why this exists:
# - Protects against accidental mass deletions when a mountpoint is unexpectedly empty/corrupt.
# - Adds an operator-visible failure mode instead of silent destructive behavior.
#
# Tuning guidance:
# - Keep this low in normal desktop usage.
# - Raise only if you intentionally perform very large delete batches while unmounted and want
#   startup reconciliation to process them automatically.
# - Must be > 0. Invalid/non-positive values fall back to the built-in default.
startup_local_delete_max_actions = 20

[logging]
level = "info"
format = "text"
