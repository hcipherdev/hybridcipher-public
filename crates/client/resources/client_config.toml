[client]
server_url = "https://api.hybridcipher.com"
timeout = 120
retry_attempts = 3
state_save_debounce_ms = 500
membership_proof_max_age_hours = 24
# [device trust policy]
# Second-party verification is an extra safety step where a separate verifier confirms the
# device fingerprint. When enabled, a device is considered fully trusted only after:
# 1 the local pin is verified, and
# 2 the second-party status is verified.
# This influences unverified-device reporting and whether a local pin verify clears entries.
# Set to true/false to disallow/allow local pin verification alone (second-party becomes optional).
require_second_party_verification = false
# [admin operations panel refresh]
# Desktop app only: controls how often the Admin -> Operations queues auto-refresh in the background.
# This refresh updates Issue Welcome, Stale Devices, and Unverified Devices counts + any active list.
# Value is in seconds. Set to 0 to disable background refresh (manual refresh and login refresh still run).
admin_operations_refresh_interval_secs = 300

# [desktop session health watchdog]
# Desktop app only: keeps the UI honest about auth state when a token expires while the window
# stays open. The frontend polls at the interval below and logs out if the session is expired
# or within the configured grace window (to avoid a race between UI and backend clock skew).
# - session_health_check_interval_secs: how often to poll the session (0 disables polling).
# - session_health_expiry_grace_secs: if the token expires within this many seconds from "now",
#   treat it as expired and force a logout so operations don't silently fail.
session_health_check_interval_secs = 60
session_health_expiry_grace_secs = 5

# [desktop mount waiting modal policy]
# Desktop app only: controls when mount modal actions become available and when
# a backgrounded mount is considered failed.
# Timeline behavior:
# - 0..mount_continue_enable_secs: "Starting mount..." state, no cancel.
# - mount_continue_enable_secs..: "Continue in background" is enabled.
# - mount_cancel_enable_secs.. (foreground only): "Cancel mount" is enabled with confirmation.
# - If user continues in background, fail the mount after mount_background_timeout_secs
#   and surface an error notification.
# Notes:
# - Values are seconds and are converted to milliseconds in the desktop frontend.
# - Set to 0 to enable the action/timeout immediately.
mount_continue_enable_secs = 10
mount_cancel_enable_secs = 120
mount_background_timeout_secs = 120

# [rekey migration state persistence]
# Rekey migration state persistence (idle crawler, it applies to auto/background rekey migration)
# Save progress every N files or at least once every x seconds (whichever comes first).
# Set either value to 0 to disable that trigger (final flush still runs at the end).
# new updates: the values of both parameters cannot be 0, otherwise the migration won't progress.

migration_state_save_batch_size = 200
migration_state_save_max_interval_secs = 5


file_index_cache_max_roots = 2
metadata_cache_max_entries = 2048

# [rekey heartbeat to server]
# Rekey heartbeat reporting cadence
# use the same migration_state_save_batch_size above to update heartbeats after every N files migrated or at least once every x seconds.

migration_heartbeat_min_interval_secs = 5

# [rekey start options]
# Background automation toggles
# When disabled, no automatic migration queueing or rekey heartbeats are emitted.
migration_automation_enabled = false
# When disabled, coverage filesystem watchers are not started automatically.
coverage_watchers_enabled = true
# [coverage IPC auto-detect opt-out]
# CLI only: when the desktop app is running, the CLI auto-detects the coverage IPC socket
# and uses it to avoid sled file-index lock contention.
# Set this env var to a truthy value (1/true/on) to opt out and force direct disk access. if no value is set, auto-detect is enabled.
coverage_ipc_opt_out_env = "HYBRIDCIPHER_COVERAGE_IPC_DISABLE"

[security]
# Enable post-quantum cryptography
pq_crypto = true
# Verify server certificates
verify_tls = true  # Enforce TLS by default; set to false only for local HTTP testing
# Enable transparency log verification
transparency_log = true  # Set to false only for local testing

[storage]
# Local storage for client data
data_dir = "~/.hybridcipher"
cache_size = "100MB"

[network]
# Network configuration
max_connections = 10
connection_timeout = 60

